<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Scout — Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #0a66c2;
    }

    .subtitle {
      font-size: 13px;
      color: #57606a;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      background: #f6f8fa;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #0a66c2;
      background: #ffffff;
    }

    .hint {
      font-size: 11px;
      color: #57606a;
      margin-top: 6px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 8px 20px;
      background: #0a66c2;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #0958a8; }

    #status {
      font-size: 12px;
      font-weight: 500;
    }

    #status.success { color: #1a7f37; }
    #status.error   { color: #cf222e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Job Scout</h1>
    <p class="subtitle">Configure your Anthropic API key to enable job summarization.</p>

    <label for="api-key">Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
    <p class="hint">Your key is stored locally in Chrome and never sent anywhere except the Anthropic API.</p>

    <div class="row">
      <button id="save-btn">Save</button>
      <span id="status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
